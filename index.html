<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Budgeting</title>

<style>
:root {
  --bg: #f5f7fb;
  --card: #ffffff;
  --text: #222;
  --accent1: #6a5acd;
  --accent2: #ff6b6b;
  --accent3: #00c9a7;
}

body {
  margin: 0;
  padding: 0;
  background: radial-gradient(circle at top, #ffffff, #e3e7ff);
  font-family: system-ui, sans-serif;
  color: var(--text);
  display: flex;
  justify-content: center;
}

.app {
  width: 100%;
  max-width: 480px;
  padding: 20px 16px 40px;
}

h1 {
  text-align: center;
  margin-bottom: 6px;
  font-size: 1.7rem;
}

.subtitle {
  text-align: center;
  font-size: .9rem;
  color: #666;
  margin-bottom: 20px;
}

.card {
  background: var(--card);
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 18px;
  box-shadow: 0 12px 28px rgba(0,0,0,0.06);
  border: 1px solid rgba(0,0,0,0.04);
}

input, select {
  width: 100%;
  padding: 10px 12px;
  border-radius: 10px;
  border: 1px solid #d0d4f0;
  background: #f9f9ff;
  font-size: .95rem;
  margin-bottom: 10px;
  transition: .2s;
}

input:focus, select:focus {
  border-color: var(--accent1);
  box-shadow: 0 0 0 2px rgba(106,90,205,0.2);
  background: #fff;
}

.btn {
  width: 100%;
  padding: 12px;
  border-radius: 999px;
  border: none;
  color: white;
  font-weight: 600;
  font-size: 1rem;
  cursor: pointer;
  background: linear-gradient(120deg, #ff6b6b, #f7b733, #00c9a7, #6a5acd);
  background-size: 300% 300%;
  animation: gradientShift 6s ease infinite;
  box-shadow: 0 10px 20px rgba(0,0,0,0.12);
  margin-top: 4px;
}

.btn-small {
  width: auto;
  padding: 8px 14px;
  border-radius: 999px;
  border: none;
  color: white;
  font-weight: 500;
  font-size: .85rem;
  cursor: pointer;
  background: linear-gradient(120deg, #00c9a7, #6a5acd);
  background-size: 200% 200%;
  animation: gradientShift 5s ease infinite;
  box-shadow: 0 6px 14px rgba(0,0,0,0.12);
}

.btn-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 8px;
}

@keyframes gradientShift {
  0% { background-position: 0% 50% }
  50% { background-position: 100% 50% }
  100% { background-position: 0% 50% }
}

.summary {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.sumBox {
  background: #f7f8ff;
  border-radius: 12px;
  padding: 10px;
  border: 1px solid #e0e3ff;
}

.sumLabel {
  font-size: .8rem;
  color: #777;
}

.sumValue {
  font-size: 1.1rem;
  font-weight: 600;
}

.positive { color: var(--accent3) }
.negative { color: var(--accent2) }

.barOuter {
  width: 100%;
  height: 16px;
  background: #e4e7ff;
  border-radius: 999px;
  overflow: hidden;
  margin-top: 10px;
  box-shadow: inset 0 0 6px rgba(0,0,0,0.15);
}

.barInner {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #00c9a7, #f7b733, #ff6b6b);
  box-shadow: 0 0 12px rgba(255,107,107,0.7);
  transition: width .3s ease;
}

.percentText {
  font-size: .8rem;
  margin-top: 4px;
  color: #555;
}

.entry {
  background: #fff;
  border-radius: 12px;
  padding: 10px;
  margin-bottom: 8px;
  border: 1px solid #e4e6f5;
  box-shadow: 0 6px 14px rgba(0,0,0,0.04);
}

.entryTop {
  display: flex;
  justify-content: space-between;
  margin-bottom: 4px;
}

.entryDesc { font-weight: 600 }
.entryAmount { font-weight: 600; color: var(--accent2) }

.entryMeta {
  font-size: .78rem;
  color: #777;
}

.empty {
  font-size: .85rem;
  color: #888;
  margin-top: 6px;
}

#fileInput {
  display: none;
}
</style>
</head>

<body>
<div class="app">

<h1>Budgeting</h1>
<div class="subtitle">Tema chiaro, pulsanti cangianti, barre luminose e backup manuale 🔆</div>

<!-- FORM -->
<div class="card">
  <input id="budgetInput" type="number" placeholder="Budget mensile (€)">
  <input id="descInput" placeholder="Descrizione spesa">
  <input id="amountInput" type="number" placeholder="Importo (€)">
  <select id="catInput">
    <option value="">Categoria</option>
    <option>Spesa</option>
    <option>Bollette</option>
    <option>Auto</option>
    <option>Salute</option>
    <option>Shopping</option>
    <option>Tempo libero</option>
    <option>Ristoranti</option>
    <option>Hobby</option>
    <option>Risparmio</option>
    <option>Altro</option>
  </select>
  <button class="btn" id="addBtn">➕ Aggiungi spesa</button>

  <div class="btn-row">
    <button class="btn-small" id="exportBtn">⬇️ Esporta dati</button>
    <button class="btn-small" id="importBtn">⬆️ Importa dati</button>
    <button class="btn-small" id="resetBtn">🗑 Reset tutto</button>
  </div>
  <input type="file" id="fileInput" accept="application/json">
</div>

<!-- RIEPILOGO -->
<div class="card">
  <div class="summary">
    <div class="sumBox">
      <div class="sumLabel">Totale speso</div>
      <div id="spentValue" class="sumValue">0 €</div>
    </div>
    <div class="sumBox">
      <div class="sumLabel">Rimanente</div>
      <div id="leftValue" class="sumValue positive">0 €</div>
    </div>
  </div>

  <div class="barOuter">
    <div id="barInner" class="barInner"></div>
  </div>
  <div id="percentText" class="percentText">0% del budget usato</div>
</div>

<h2>Storico spese</h2>
<div id="list"></div>

</div>

<script>
const budgetInput = document.getElementById("budgetInput");
const descInput = document.getElementById("descInput");
const amountInput = document.getElementById("amountInput");
const catInput = document.getElementById("catInput");
const addBtn = document.getElementById("addBtn");

const spentValue = document.getElementById("spentValue");
const leftValue = document.getElementById("leftValue");
const barInner = document.getElementById("barInner");
const percentText = document.getElementById("percentText");
const list = document.getElementById("list");

const exportBtn = document.getElementById("exportBtn");
const importBtn = document.getElementById("importBtn");
const resetBtn = document.getElementById("resetBtn");
const fileInput = document.getElementById("fileInput");

let state = { budget: 0, entries: [] };

function loadState() {
  try {
    const raw = localStorage.getItem("budgetingState");
    if (raw) state = JSON.parse(raw);
  } catch {
    state = { budget: 0, entries: [] };
  }
}

function saveState() {
  localStorage.setItem("budgetingState", JSON.stringify(state));
}

function render() {
  if (state.budget > 0) budgetInput.value = state.budget;

  const spent = state.entries.reduce((s, e) => s + e.amount, 0);
  const left = state.budget - spent;
  const percent = state.budget > 0 ? Math.min(100, Math.round((spent / state.budget) * 100)) : 0;

  spentValue.textContent = spent.toFixed(2) + " €";
  leftValue.textContent = left.toFixed(2) + " €";
  leftValue.className = "sumValue " + (left < 0 ? "negative" : "positive");

  barInner.style.width = percent + "%";
  percentText.textContent = percent + "% del budget usato";

  list.innerHTML = "";
  if (state.entries.length === 0) {
    list.innerHTML = `<div class="empty">Nessuna spesa ancora.</div>`;
    return;
  }

  state.entries.forEach(e => {
    const div = document.createElement("div");
    div.className = "entry";
    div.innerHTML = `
      <div class="entryTop">
        <div class="entryDesc">${e.desc}</div>
        <div class="entryAmount">-${e.amount.toFixed(2)} €</div>
      </div>
      <div class="entryMeta">📂 ${e.cat || "Senza categoria"} · ${e.date}</div>
    `;
    list.appendChild(div);
  });
}

function addEntry() {
  const b = parseFloat(budgetInput.value);
  if (!isNaN(b) && b >= 0) state.budget = b;

  const desc = descInput.value.trim();
  const amount = parseFloat(amountInput.value);
  const cat = catInput.value;

  if (!desc || isNaN(amount) || amount <= 0) return;

  const now = new Date();
  const dateStr = now.toLocaleDateString("it-IT");

  state.entries.push({ desc, amount, cat, date: dateStr });

  descInput.value = "";
  amountInput.value = "";
  catInput.value = "";

  saveState();
  render();
}

addBtn.onclick = addEntry;

budgetInput.onchange = () => {
  const b = parseFloat(budgetInput.value);
  if (!isNaN(b) && b >= 0) {
    state.budget = b;
    saveState();
    render();
  }
};

/* EXPORT */
exportBtn.onclick = () => {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  const date = new Date().toISOString().slice(0,10);
  a.download = `budgeting-${date}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
};

/* IMPORT */
importBtn.onclick = () => {
  fileInput.value = "";
  fileInput.click();
};

fileInput.onchange = () => {
  const file = fileInput.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data || typeof data !== "object") return;
      if (!Array.isArray(data.entries)) data.entries = [];
      if (typeof data.budget !== "number") data.budget = 0;
      state = data;
      saveState();
      render();
    } catch {
      // se il file è sbagliato, semplicemente ignora
    }
  };
  reader.readAsText(file);
};

/* RESET */
resetBtn.onclick = () => {
  if (!confirm("Sei sicuro di voler cancellare tutto?")) return;
  state = { budget: 0, entries: [] };
  saveState();
  render();
};

loadState();
render();
</script>

</body>
</html>
