<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Budgeting</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <!-- Semaforo -->
    <div id="saveStatus" class="statusIndicator ok">🟢 Salvato</div>

    <h1>Budget Mensile 💰</h1>

    <!-- BUDGET BEN VISIBILE -->
    <div class="summaryBox" style="margin-bottom:20px;">
      <h3>Imposta il tuo budget</h3>
      <input id="budgetInput" type="number" placeholder="Budget mensile (€)">
    </div>

    <!-- Riepilogo 50‑30‑20 -->
    <div class="summaryBox">
      <h3>Riepilogo 50‑30‑20</h3>

      <div class="summaryItem">
        <strong>Necessità (50%):</strong>
        <span id="necUsed">0€</span> / <span id="necLimit">0€</span>
        <div><strong>Residuo:</strong> <span id="necLeft">0€</span></div>
      </div>

      <div class="summaryItem">
        <strong>Desideri (30%):</strong>
        <span id="desUsed">0€</span> / <span id="desLimit">0€</span>
        <div><strong>Residuo:</strong> <span id="desLeft">0€</span></div>
      </div>

      <div class="summaryItem">
        <strong>Risparmio (20%):</strong>
        <span id="risUsed">0€</span> / <span id="risLimit">0€</span>
        <div><strong>Residuo:</strong> <span id="risLeft">0€</span></div>
      </div>

      <hr>

      <div class="summaryItem">
        <strong>Totale spese:</strong> <span id="totaleSpese">0€</span>
      </div>

      <div class="summaryItem">
        <strong>Residuo totale:</strong> <span id="residuoTotale">0€</span>
      </div>
    </div>

    <!-- ORDINAMENTO -->
    <div class="sortWrapper">
      <select id="sortSelect" onchange="applySort()" class="sortMenu">
        <option value="recent">📅 Recenti</option>
        <option value="az">🔤 A → Z</option>
        <option value="za">🔤 Z → A</option>
      </select>
    </div>

    <!-- FORM -->
    <div class="form">

      <select id="monthSelect">
        <option>Gennaio</option><option>Febbraio</option><option>Marzo</option>
        <option>Aprile</option><option>Maggio</option><option>Giugno</option>
        <option>Luglio</option><option>Agosto</option><option>Settembre</option>
        <option>Ottobre</option><option>Novembre</option><option>Dicembre</option>
      </select>

      <select id="yearSelect">
        <option>2025</option>
        <option selected>2026</option>
        <option>2027</option>
      </select>

      <input id="descInput" placeholder="Descrizione spesa">
      <input id="amountInput" type="number" step="0.01" placeholder="Importo €">

      <select id="categoryInput">
        <option>Spesa</option>
        <option>Auto</option>
        <option>Bollette</option>
        <option>Salute</option>
        <option>Ristoranti</option>
        <option>Tempo libero</option>
        <option>Shopping</option>
        <option>Hobby</option>
        <option>Risparmio</option>
        <option>Investimenti</option>
      </select>

      <textarea id="noteInput" placeholder="Note (opzionale)"></textarea>

      <button id="addBtn" class="btn-crazy" onclick="addExpense()">➕ Aggiungi spesa</button>

    </div>

    <h2>Storico spese</h2>
    <div id="list"></div>

  </div>

  <script src="app.js"></script>
</body>
</html>
