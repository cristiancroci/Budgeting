<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Budgeting</title>

<style>
:root {
  --bg: #f5f7fb;
  --card: #ffffff;
  --text: #222;

  /* COLORI 50/30/20 */
  --nec: #ff3b3b;   /* Necessità rosso pulsante */
  --des: #3b7bff;   /* Desideri blu neon */
  --ris: #00c96b;   /* Risparmio verde */
}

body {
  margin: 0;
  padding: 0;
  background: radial-gradient(circle at top, #ffffff, #e3e7ff);
  font-family: system-ui, sans-serif;
  color: var(--text);
  display: flex;
  justify-content: center;
}

.app {
  width: 100%;
  max-width: 480px;
  padding: 20px 16px 40px;
}

h1 {
  text-align: center;
  margin-bottom: 6px;
  font-size: 1.7rem;
}

.subtitle {
  text-align: center;
  font-size: .9rem;
  color: #666;
  margin-bottom: 20px;
}

.card {
  background: var(--card);
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 18px;
  box-shadow: 0 12px 28px rgba(0,0,0,0.06);
  border: 1px solid rgba(0,0,0,0.04);
}

input, select {
  width: 100%;
  padding: 10px 12px;
  border-radius: 10px;
  border: 1px solid #d0d4f0;
  background: #f9f9ff;
  font-size: .95rem;
  margin-bottom: 10px;
  transition: .2s;
}

input:focus, select:focus {
  border-color: #6a5acd;
  box-shadow: 0 0 0 2px rgba(106,90,205,0.2);
  background: #fff;
}

.btn {
  width: 100%;
  padding: 12px;
  border-radius: 999px;
  border: none;
  color: white;
  font-weight: 600;
  font-size: 1rem;
  cursor: pointer;
  background: linear-gradient(120deg, #ff6b6b, #f7b733, #00c9a7, #6a5acd);
  background-size: 300% 300%;
  animation: gradientShift 6s ease infinite;
  box-shadow: 0 10px 20px rgba(0,0,0,0.12);
  margin-top: 4px;
}

.btn-small {
  width: auto;
  padding: 8px 14px;
  border-radius: 999px;
  border: none;
  color: white;
  font-weight: 500;
  font-size: .85rem;
  cursor: pointer;
  background: linear-gradient(120deg, #00c9a7, #6a5acd);
  background-size: 200% 200%;
  animation: gradientShift 5s ease infinite;
  box-shadow: 0 6px 14px rgba(0,0,0,0.12);
}

.btn-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 8px;
}

@keyframes gradientShift {
  0% { background-position: 0% 50% }
  50% { background-position: 100% 50% }
  100% { background-position: 0% 50% }
}

/* ------------------------------
   RIEPILOGO 50/30/20
--------------------------------*/
.barGroup {
  margin-top: 14px;
}

.barLabel {
  font-size: .85rem;
  margin-bottom: 4px;
  color: #555;
}

.barOuter {
  width: 100%;
  height: 16px;
  border-radius: 999px;
  overflow: hidden;
  background: #e4e7ff;
  box-shadow: inset 0 0 6px rgba(0,0,0,0.15);
}

.barInner {
  height: 100%;
  width: 0%;
  background-size: 200% 200%;
  animation: gradientShift 4s ease infinite;
  transition: width .3s ease;
}

/* COLORI BARRE 50/30/20 */
.barNec { background: linear-gradient(90deg, var(--nec), #ff8a8a); box-shadow: 0 0 12px rgba(255,0,0,0.6); }
.barDes { background: linear-gradient(90deg, var(--des), #8ab3ff); box-shadow: 0 0 12px rgba(0,80,255,0.6); }
.barRis { background: linear-gradient(90deg, var(--ris), #7dffb8); box-shadow: 0 0 12px rgba(0,255,120,0.6); }

.percentText {
  font-size: .8rem;
  margin-top: 4px;
  color: #555;
}

/* ------------------------------
   LISTA SPESE
--------------------------------*/
.entry {
  background: #fff;
  border-radius: 12px;
  padding: 10px;
  margin-bottom: 8px;
  border: 1px solid #e4e6f5;
  box-shadow: 0 6px 14px rgba(0,0,0,0.04);
}

.entryTop {
  display: flex;
  justify-content: space-between;
  margin-bottom: 4px;
}

.entryDesc { font-weight: 600 }
.entryAmount { font-weight: 600; color: var(--nec) }

.entryMeta {
  font-size: .78rem;
  color: #777;
}

/* Icone stile B */
.entryActions {
  display: flex;
  gap: 10px;
  font-size: 1.2rem;
  margin-top: 6px;
}

.entryActions span {
  cursor: pointer;
  opacity: 0.7;
  transition: .2s;
}

.entryActions span:hover {
  opacity: 1;
  transform: scale(1.15);
}

/* Barra luminosa per ogni voce */
.entry .barOuter {
  height: 12px;
  margin-top: 8px;
}

.entry .barInner {
  height: 100%;
  background: linear-gradient(90deg, #00c9a7, #f7b733, #ff6b6b);
  background-size: 200% 200%;
  animation: gradientShift 4s ease infinite;
  box-shadow: 0 0 10px rgba(255,107,107,0.7);
  transition: width .3s ease;
}

.empty {
  font-size: .85rem;
  color: #888;
  margin-top: 6px;
}

#fileInput { display: none; }
</style>
</head>

<body>
<div class="app">

<h1>Budgeting</h1>
<div class="subtitle">Metodo 50/30/20 con modifica ed eliminazione 🔥</div>

<!-- FORM -->
<div class="card">
  <input id="budgetInput" type="number" placeholder="Budget mensile (€)">
  <input id="extraInput" type="number" placeholder="Entrata extra (€)">
  <button class="btn-small" id="addExtraBtn">➕ Aggiungi entrata</button>

  <input id="descInput" placeholder="Descrizione spesa">
  <input id="amountInput" type="number" placeholder="Importo (€)">
  <select id="catInput">
    <option value="">Categoria</option>
    <option>Necessità</option>
    <option>Desideri</option>
    <option>Risparmio</option>
  </select>

  <button class="btn" id="addBtn">➕ Aggiungi spesa</button>

  <div class="btn-row">
    <button class="btn-small" id="exportBtn">⬇️ Esporta</button>
    <button class="btn-small" id="importBtn">⬆️ Importa</button>
    <button class="btn-small" id="resetBtn">🗑 Reset</button>
  </div>

  <input type="file" id="fileInput" accept="application/json">
</div>

<!-- RIEPILOGO 50/30/20 -->
<div class="card">
  <h3>Riepilogo 50 / 30 / 20</h3>

  <div class="barGroup">
    <div class="barLabel">Necessità (50%)</div>
    <div class="barOuter"><div id="barNec" class="barInner barNec"></div></div>
    <div id="textNec" class="percentText">0% usato</div>
  </div>

  <div class="barGroup">
    <div class="barLabel">Desideri (30%)</div>
    <div class="barOuter"><div id="barDes" class="barInner barDes"></div></div>
    <div id="textDes" class="percentText">0% usato</div>
  </div>

  <div class="barGroup">
    <div class="barLabel">Risparmio (20%)</div>
    <div class="barOuter"><div id="barRis" class="barInner barRis"></div></div>
    <div id="textRis" class="percentText">0% usato</div>
  </div>
</div>

<h2>Storico spese</h2>
<div id="list"></div>

</div>
