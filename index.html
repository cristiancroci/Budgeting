<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Budget Percentuale</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
  body {
    font-family: -apple-system, system-ui;
    margin: 0;
    padding: 20px;
    background: #f7faff;
    color: #111;
  }

  h1 { text-align: center; margin-bottom: 20px; }

  .container {
    display: flex;
    gap: 20px;
  }

  .left, .right {
    flex: 1;
  }

  @media(max-width: 900px) {
    .container {
      flex-direction: column;
    }
  }

  .card {
    background: #000;
    color: #fff;
    border-radius: 18px;
    padding: 20px;
    margin-bottom: 20px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.25);
    border: 2px solid transparent;
    position: relative;
  }

  .card.glow::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 18px;
    padding: 2px;
    background: linear-gradient(135deg, #00c6ff, #00ff9d);
    -webkit-mask: 
      linear-gradient(#fff 0 0) content-box, 
      linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
            mask-composite: exclude;
  }

  label { font-weight: 600; display: block; margin-bottom: 6px; }

  input, select {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: 1px solid #444;
    margin-bottom: 12px;
    font-size: 16px;
    background: #111;
    color: #fff;
  }

  button {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #00c6ff, #00ff9d);
    color: #000;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 10px;
  }

  .row {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
  }

  .row input {
    width: 50%;
  }

  .bar {
    height: 10px;
    background: #333;
    border-radius: 999px;
    overflow: hidden;
    margin-top: 6px;
  }

  .bar-fill {
    height: 100%;
    background: linear-gradient(135deg, #00c6ff, #00ff9d);
    width: 0%;
    transition: width .3s;
  }

  .expense-item {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    border-bottom: 1px solid #333;
  }

  .expense-item button {
    width: auto;
    padding: 4px 10px;
    background: #ff3b30;
    color: #fff;
    border-radius: 8px;
    font-size: 14px;
  }
</style>
</head>
<body>

<h1>Budget Percentuale</h1>

<div class="container">

  <div class="left">

    <div class="card glow">
      <label>Reddito mensile (€)</label>
      <input type="number" id="income" placeholder="Es. 2000">
    </div>

    <div class="card glow" id="categories">
      <h2>Categorie</h2>

      <div class="row">
        <input type="text" class="cat-name" value="Bisogni">
        <input type="number" class="cat-percent" value="50">
      </div>

      <div class="row">
        <input type="text" class="cat-name" value="Desideri">
        <input type="number" class="cat-percent" value="30">
      </div>

      <div class="row">
        <input type="text" class="cat-name" value="Risparmio">
        <input type="number" class="cat-percent" value="20">
      </div>

      <p id="sumInfo"></p>
    </div>

    <button id="calcBtn">Calcola budget</button>

    <div class="card glow">
      <h2>Inserisci spesa</h2>

      <label>Categoria</label>
      <select id="expenseCat"></select>

      <label>Nome spesa</label>
      <input type="text" id="expenseName">

      <label>Importo (€)</label>
      <input type="number" id="expenseAmount">

      <button id="addExpense">Aggiungi spesa</button>
    </div>

  </div>

  <div class="right">

    <div class="card glow" id="results"></div>

    <div class="card glow">
      <h2>Distribuzione Budget</h2>
      <canvas id="pieChart"></canvas>
    </div>

  </div>

</div>

<script>
var budgets = {};
var income = 0;
var pie = null;

function getRows() {
  return Array.prototype.slice.call(
    document.querySelectorAll("#categories .row")
  );
}

function updatePercentSum() {
  var sum = 0;
  var rows = getRows();
  for (var i = 0; i < rows.length; i++) {
    var p = parseFloat(rows[i].querySelector(".cat-percent").value) || 0;
    sum += p;
  }
  var info = document.getElementById("sumInfo");
  info.textContent = "Somma percentuali: " + sum + "%";
  info.style.color = sum !== 100 ? "#ff3b30" : "#00ff9d";
}

document.getElementById("categories").addEventListener("input", function () {
  updatePercentSum();
});
updatePercentSum();

document.getElementById("calcBtn").onclick = function () {
  income = parseFloat(document.getElementById("income").value);
  if (!income) {
    alert("Inserisci un reddito valido");
    return;
  }

  budgets = {};
  var results = document.getElementById("results");
  results.innerHTML = "<h2>Budget calcolato</h2>";

  var html = "";
  var select = document.getElementById("expenseCat");
  select.innerHTML = "";

  var rows = getRows();
  for (var i = 0; i < rows.length; i++) {
    var name = rows[i].querySelector(".cat-name").value;
    var p = parseFloat(rows[i].querySelector(".cat-percent").value) || 0;
    var max = income * (p / 100);

    budgets[name] = { max: max, spent: 0, items: [] };

    html += '<div style="margin-bottom:15px">' +
      "<strong>" + name + "</strong> — " + p + "%<br>" +
      "Budget: " + max.toFixed(2) + " €<br>" +
      'Speso: <span id="spent-' + name + '">0.00</span> €<br>' +
      'Rimanente: <span id="left-' + name + '">' + max.toFixed(2) + "</span> €" +
      '<div class="bar"><div class="bar-fill" id="bar-' + name + '"></div></div>' +
      '<div id="list-' + name + '"></div>' +
      "</div>";

    var opt = document.createElement("option");
    opt.value = name;
    opt.textContent = name;
    select.appendChild(opt);
  }

  results.innerHTML += html;
  drawChart();
};

document.getElementById("addExpense").onclick = function () {
  var cat = document.getElementById("expenseCat").value;
  var name = document.getElementById("expenseName").value.replace(/^\s+|\s+$/g, "");
  var amount = parseFloat(document.getElementById("expenseAmount").value);

  if (!name) {
    alert("Inserisci il nome della spesa");
    return;
  }
  if (!amount || amount <= 0) {
    alert("Inserisci un importo valido");
    return;
  }
  if (!budgets[cat]) {
    alert("Prima calcola il budget");
    return;
  }

  budgets[cat].items.push({ name: name, amount: amount });
  budgets[cat].spent += amount;

  updateCategoryUI(cat);
  drawChart();

  document.getElementById("expenseName").value = "";
  document.getElementById("expenseAmount").value = "";
};

function updateCategoryUI(cat) {
  var left = budgets[cat].max - budgets[cat].spent;

  document.getElementById("spent-" + cat).textContent =
    budgets[cat].spent.toFixed(2);
  document.getElementById("left-" + cat).textContent =
    left.toFixed(2);

  var perc = Math.min(100, (budgets[cat].spent / budgets[cat].max) * 100);
  document.getElementById("bar-" + cat).style.width = perc + "%";

  var list = document.getElementById("list-" + cat);
  list.innerHTML = "";

  for (var i = 0; i < budgets[cat].items.length; i++) {
    var item = budgets[cat].items[i];
    var div = document.createElement("div");
    div.className = "expense-item";
    div.innerHTML =
      item.name + " — " + item.amount + "€ " +
      '<button onclick="deleteExpense(\'' + cat + '\',' + i + ')">×</button>';
    list.appendChild(div);
  }
}

function deleteExpense(cat, index) {
  var amount = budgets[cat].items[index].amount;
  budgets[cat].spent -= amount;
  budgets[cat].items.splice(index, 1);

  updateCategoryUI(cat);
  drawChart();
}

function drawChart() {
  var ctx = document.getElementById("pieChart").getContext("2d");
  var labels = [];
  var values = [];
  for (var k in budgets) {
    if (budgets.hasOwnProperty(k)) {
      labels.push(k);
      values.push(budgets[k].max);
    }
  }

  if (pie) {
    pie.destroy();
  }

  pie = new Chart(ctx, {
    type: "pie",
    data: {
      labels: labels,
      datasets: [{
        data: values,
        backgroundColor: ["#00c6ff", "#00ff9d", "#00e0ff"]
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { position: "bottom" }
      }
    }
  });
}
</script>

</body>
</html>
