<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Budget Percentuale</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<h1>Budget Percentuale</h1>

<div class="container">

  <div class="left">

    <div class="card glow">
      <label>Reddito mensile (€)</label>
      <input type="number" id="income" placeholder="Es. 2000">
    </div>

    <div class="card glow" id="categories">
      <h2>Categorie</h2>

      <div class="row">
        <input type="text" class="cat-name" value="Bisogni">
        <input type="number" class="cat-percent" value="50">
      </div>

      <div class="row">
        <input type="text" class="cat-name" value="Desideri">
        <input type="number" class="cat-percent" value="30">
      </div>

      <div class="row">
        <input type="text" class="cat-name" value="Risparmio">
        <input type="number" class="cat-percent" value="20">
      </div>

      <p id="sumInfo"></p>
    </div>

    <button id="calcBtn">Calcola budget</button>

    <div class="card glow">
      <h2>Inserisci spesa</h2>

      <label>Categoria</label>
      <select id="expenseCat"></select>

      <label>Nome spesa</label>
      <input type="text" id="expenseName">

      <label>Importo (€)</label>
      <input type="number" id="expenseAmount">

      <button id="addExpense">Aggiungi spesa</button>
    </div>

  </div>

  <div class="right">

    <div class="card glow" id="results"></div>

    <div class="card glow">
      <h2>Distribuzione Budget</h2>
      <canvas id="pieChart"></canvas>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
