<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Budgeting 50/30/20</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
<div class="app">

<h1>Budgeting</h1>
<div class="subtitle">50/30/20 con mesi, entrate extra, modifica ed eliminazione</div>

<!-- SELETTORE MESE -->
<div style="margin-bottom:15px;">
  <label style="font-size:.9rem; color:#555;">📅 Mese:</label>
  <select id="meseSelect"></select>

  <button class="btn-small" id="addMonthBtn" type="button" style="margin-top:10px;">
    ➕ Aggiungi mese
  </button>
</div>

<!-- FORM -->
<div class="card">
  <input id="budgetInput" type="number" placeholder="Budget mensile (€)">
  
  <div style="display:flex; gap:8px; align-items:center; margin-bottom:10px;">
    <input id="extraInput" type="number" placeholder="Entrata extra (€)" style="flex:1; margin-bottom:0;">
    <button class="btn-small" id="addExtraBtn" type="button">➕ Entrata</button>
  </div>

  <input id="descInput" placeholder="Descrizione spesa">
  <input id="amountInput" type="number" placeholder="Importo (€)">
  
  <select id="catInput">
    <option value="">Categoria</option>
    <option>Necessità</option>
    <option>Desideri</option>
    <option>Risparmio</option>
  </select>

  <button class="btn" id="addBtn" type="button">➕ Aggiungi spesa</button>

  <div class="btn-row">
    <button class="btn-small" id="exportBtn" type="button">⬇️ Esporta</button>
    <button class="btn-small" id="importBtn" type="button">⬆️ Importa</button>
  </div>

  <input type="file" id="fileInput" accept="application/json">
</div>

<!-- RIEPILOGO -->
<div class="card">
  <h3>Riepilogo 50 / 30 / 20</h3>
  <div id="totalInfo" class="percentText" style="margin-bottom:8px;">Budget totale: 0€</div>

  <div class="barGroup">
    <div class="barLabel">Necessità (50%)</div>
    <div class="barOuter"><div id="barNec" class="barInner barNec"></div></div>
    <div id="textNec" class="percentText">0% usato</div>
  </div>

  <div class="barGroup">
    <div class="barLabel">Desideri (30%)</div>
    <div class="barOuter"><div id="barDes" class="barInner barDes"></div></div>
    <div id="textDes" class="percentText">0% usato</div>
  </div>

  <div class="barGroup">
    <div class="barLabel">Risparmio (20%)</div>
    <div class="barOuter"><div id="barRis" class="barInner barRis"></div></div>
    <div id="textRis" class="percentText">0% usato</div>
  </div>
</div>

<h2>Storico spese</h2>
<div id="list"></div>

<script>
/* ------------------------------
   STRUTTURA DATI
--------------------------------*/
let state = {
  meseCorrente: "",
  mesi: {}
};

/* ------------------------------
   UTILS
--------------------------------*/
function getCurrentMonthKey() {
  const d = new Date();
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0");
}

function mese() {
  return state.mesi[state.meseCorrente];
}

/* ------------------------------
   LOAD / SAVE
--------------------------------*/
function loadState() {
  try {
    const raw = localStorage.getItem("budgetingState");
    if (raw) state = JSON.parse(raw);
  } catch {}

  if (!state.meseCorrente) state.meseCorrente = getCurrentMonthKey();

  if (!state.mesi[state.meseCorrente]) {
    state.mesi[state.meseCorrente] = { budget: 0, extra: 0, entries: [] };
  }
}

function saveState() {
  localStorage.setItem("budgetingState", JSON.stringify(state));
}

/* ------------------------------
   RENDER MESE SELECTOR
--------------------------------*/
function renderMonthSelector() {
  const sel = document.getElementById("meseSelect");
  sel.innerHTML = "";

  Object.keys(state.mesi).sort().forEach(key => {
    const opt = document.createElement("option");
    opt.value = key;
    opt.textContent = key;
    if (key === state.meseCorrente) opt.selected = true;
    sel.appendChild(opt);
  });
}

/* ------------------------------
   AGGIUNGI MESE
--------------------------------*/
function addMonth() {
  const keys = Object.keys(state.mesi).sort();
  const last = keys[keys.length - 1];

  let [year, month] = last.split("-").map(n => parseInt(n));
  month++;
  if (month > 12) {
    month = 1;
    year++;
  }

  const newKey = year + "-" + String(month).padStart(2, "0");

  state.mesi[newKey] = { budget: 0, extra: 0, entries: [] };
  state.meseCorrente = newKey;

  saveState();
  render();
}

/* ------------------------------
   RENDER
--------------------------------*/
function getTotalBudget() {
  return (mese().budget || 0) + (mese().extra || 0);
}

function render() {
  renderMonthSelector();

  const totalBudget = getTotalBudget();
  document.getElementById("totalInfo").textContent =
    `Budget totale: ${totalBudget.toFixed(2)}€ (${mese().budget.toFixed(2)} budget + ${mese().extra.toFixed(2)} entrate)`;

  document.getElementById("budgetInput").value = mese().budget || "";
  document.getElementById("extraInput").value = "";

  let nec = 0, des = 0, ris = 0;
  mese().entries.forEach(e => {
    if (e.cat === "Necessità") nec += e.amount;
    if (e.cat === "Desideri") des += e.amount;
    if (e.cat === "Risparmio") ris += e.amount;
  });

  const limNec = totalBudget * 0.50;
  const limDes = totalBudget * 0.30;
  const limRis = totalBudget * 0.20;

  const pNec = limNec ? Math.min(100, Math.round(nec / limNec * 100)) : 0;
  const pDes = limDes ? Math.min(100, Math.round(des / limDes * 100)) : 0;
  const pRis = limRis ? Math.min(100, Math.round(ris / limRis * 100)) : 0;

  barNec.style.width = pNec + "%";
  barDes.style.width = pDes + "%";
  barRis.style.width = pRis + "%";

  textNec.textContent = `${pNec}% usato (${nec.toFixed(2)}€ / ${limNec.toFixed(2)}€)`;
  textDes.textContent = `${pDes}% usato (${des.toFixed(2)}€ / ${limDes.toFixed(2)}€)`;
  textRis.textContent = `${pRis}% usato (${ris.toFixed(2)}€ / ${limRis.toFixed(2)}€)`;

  const list = document.getElementById("list");
  list.innerHTML = "";

  if (mese().entries.length === 0) {
    list.innerHTML = `<div class="empty">Nessuna spesa per questo mese.</div>`;
    return;
  }

  mese().entries.forEach((e, index) => {
    const percentEntry = totalBudget ? Math.min(100, Math.round(e.amount / totalBudget * 100)) : 0;

    const div = document.createElement("div");
    div.className = "entry";
    div.dataset.index = index;

    div.innerHTML = `
      <div class="entryTop">
        <div>
          <div class="entryDesc">${e.desc}</div>
          <div class="entryMeta">📂 ${e.cat} · ${e.date}</div>
        </div>
        <div class="entryActions">
          <div class="entryAmount">-${e.amount.toFixed(2)} €</div>
          <span class="edit">✏️</span>
          <span class="delete">🗑</span>
        </div>
      </div>
      <div class="barOuter">
        <div class="barInner" style="width:${percentEntry}%;"></div>
      </div>
      <div class="percentText">${percentEntry}% del budget totale</div>
    `;

    list.appendChild(div);
  });
}

/* ------------------------------
   EVENTI
--------------------------------*/
document.getElementById("addMonthBtn").onclick = addMonth;

document.getElementById("addBtn").onclick = addEntry;
document.getElementById("addExtraBtn").onclick = addExtra;

document.getElementById("budgetInput").onchange = () => {
  const b = parseFloat(budgetInput.value);
  if (!isNaN(b) && b >= 0) {
    mese().budget = b;
    saveState();
    render();
  }
};

document.getElementById("meseSelect").addEventListener("change", (e) => {
  state.meseCorrente = e.target.value;
  if (!state.mesi[state.meseCorrente])
    state.mesi[state.meseCorrente] = { budget: 0, extra: 0, entries: [] };
  saveState();
  render();
});

document.getElementById("list").addEventListener("click", (e) => {
  const entryDiv = e.target.closest(".entry");
  if (!entryDiv) return;
  const index = parseInt(entryDiv.dataset.index, 10);

  if (e.target.classList.contains("edit")) {
    handleEdit(index);
  } else if (e.target.classList.contains("delete")) {
    handleDelete(index);
  }
});

/* ------------------------------
   EXPORT
--------------------------------*/
document.getElementById("exportBtn").onclick = () => {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  const date = new Date().toISOString().slice(0,10);
  a.download = `budgeting-${date}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
};

/* ------------------------------
   IMPORT
--------------------------------*/
document.getElementById("importBtn").onclick = () => {
  fileInput.value = "";
  fileInput.click();
};

document.getElementById("fileInput").onchange = () => {
  const file = fileInput.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data || typeof data !== "object") return;
      if (!data.mesi) data.mesi = {};
      if (!data.meseCorrente) data.meseCorrente = getCurrentMonthKey();
      state = data;
      if (!state.mesi[state.meseCorrente])
        state.mesi[state.meseCorrente] = { budget: 0, extra: 0, entries: [] };
      saveState();
      render();
    } catch {}
  };
  reader.readAsText(file);
};

/* ------------------------------
   INIT
--------------------------------*/
loadState();
render();
</script>


</div>
</body>
</html>
